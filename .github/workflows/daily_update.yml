name: XAUUSD Daily Telemetry

on:
  schedule:
    # Runs at 21:00 UTC every day (which is exactly 00:00 Midnight in Turkey - GMT+3)
    - cron: '0 21 * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push commits back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Market Data
        run: python fetch_data.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -f data/xauusd_daily.json ]; then
            git add data/xauusd_daily.json
            # Only commit if there are actual changes
            git diff-index --quiet HEAD || git commit -m "chore(data): daily XAUUSD telemetry update"
            git push
          else
            echo "Skipping commit: data/xauusd_daily.json was not generated."
          fi
